<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AulaSync</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  @property --angle {
    syntax: '<angle>';
    initial-value: 0deg;
    inherits: false;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #060b14;
    --surface: rgba(11, 18, 32, 0.85);
    --surface2: rgba(16, 26, 46, 0.9);
    --cyan: #00e5ff;
    --purple: #c084fc;
    --blue: #60a5fa;
    --green: #34d399;
    --orange: #fb923c;
    --red: #f87171;
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --border: rgba(255,255,255,0.06);
    --led-speed: 3s;
    --led-color1: #00e5ff;
    --led-color2: #c084fc;
  }

  body {
    font-family: 'Space Grotesk', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── BACKGROUND ─────────────────────────────── */
  .bg-layer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .bg-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
  }
  .bg-glow {
    position: absolute;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.18;
    animation: pulse-glow 6s ease-in-out infinite alternate;
  }
  .bg-glow-1 { width: 600px; height: 600px; background: var(--cyan); top: -200px; left: -150px; }
  .bg-glow-2 { width: 500px; height: 500px; background: var(--purple); bottom: -100px; right: -100px; animation-delay: -3s; }
  .bg-glow-3 { width: 300px; height: 300px; background: var(--blue); top: 40%; left: 55%; animation-delay: -1.5s; }

  @keyframes pulse-glow {
    from { opacity: 0.12; transform: scale(1); }
    to   { opacity: 0.22; transform: scale(1.1); }
  }

  /* ─── LED BORDER MIXIN ───────────────────────── */
  .led {
    position: relative;
    border-radius: 14px;
    isolation: isolate;
  }
  .led::before {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: inherit;
    background: conic-gradient(
      from var(--angle),
      transparent 0%,
      transparent 30%,
      var(--led-color1) 45%,
      var(--led-color2) 55%,
      transparent 70%,
      transparent 100%
    );
    animation: spin-border var(--led-speed) linear infinite;
    z-index: -1;
  }
  .led::after {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: inherit;
    background: conic-gradient(
      from var(--angle),
      transparent 0%,
      transparent 30%,
      var(--led-color1) 45%,
      var(--led-color2) 55%,
      transparent 70%,
      transparent 100%
    );
    animation: spin-border var(--led-speed) linear infinite;
    filter: blur(8px);
    opacity: 0.6;
    z-index: -2;
  }
  @keyframes spin-border {
    to { --angle: 360deg; }
  }

  /* Static glow variant (no spin) */
  .led-static::before {
    background: linear-gradient(135deg, var(--led-color1), var(--led-color2));
    animation: none;
  }
  .led-static::after {
    background: linear-gradient(135deg, var(--led-color1), var(--led-color2));
    animation: none;
    filter: blur(12px);
    opacity: 0.4;
  }

  /* ─── LAYOUT ─────────────────────────────────── */
  .page { position: relative; z-index: 1; min-height: 100vh; }

  /* ─── NAVBAR ─────────────────────────────────── */
  .navbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(6, 11, 20, 0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(0,229,255,0.12);
    box-shadow: 0 0 40px rgba(0,229,255,0.05);
    padding: 0 32px;
    height: 64px;
    display: flex;
    align-items: center;
    gap: 0;
  }

  .nav-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-right: 48px;
  }
  .nav-logo-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--cyan), var(--purple));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    box-shadow: 0 0 16px rgba(0,229,255,0.5);
  }
  .nav-logo-text {
    font-family: 'Space Mono', monospace;
    font-size: 18px;
    font-weight: 700;
    background: linear-gradient(90deg, var(--cyan), var(--purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }

  .nav-links {
    display: flex;
    align-items: center;
    gap: 4px;
    flex: 1;
  }
  .nav-link {
    padding: 7px 14px;
    border-radius: 8px;
    font-size: 13.5px;
    font-weight: 500;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
    border: none;
    background: transparent;
    font-family: inherit;
  }
  .nav-link:hover {
    color: var(--text);
    background: rgba(255,255,255,0.06);
  }
  .nav-link.active {
    color: var(--cyan);
    background: rgba(0,229,255,0.1);
    box-shadow: 0 0 12px rgba(0,229,255,0.15), inset 0 0 12px rgba(0,229,255,0.05);
  }
  .nav-link .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--cyan);
    box-shadow: 0 0 6px var(--cyan);
  }

  .nav-user {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-left: auto;
    padding: 6px 14px 6px 8px;
    border-radius: 40px;
    border: 1px solid rgba(192,132,252,0.25);
    background: rgba(192,132,252,0.06);
    cursor: pointer;
    transition: all 0.2s;
  }
  .nav-user:hover { border-color: rgba(192,132,252,0.5); background: rgba(192,132,252,0.1); }
  .nav-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--purple), var(--blue));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    box-shadow: 0 0 12px rgba(192,132,252,0.4);
  }
  .nav-user-info { line-height: 1.2; }
  .nav-user-name { font-size: 13px; font-weight: 600; }
  .nav-user-role { font-size: 11px; color: var(--text-dim); }

  /* ─── MAIN ───────────────────────────────────── */
  .main { padding: 40px 40px 60px; max-width: 1280px; margin: 0 auto; }

  /* ─── HERO ───────────────────────────────────── */
  .hero { margin-bottom: 40px; display: flex; align-items: flex-start; justify-content: space-between; gap: 32px; }
  .hero-left { flex: 1; }
  .hero-date {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--cyan);
    text-transform: uppercase;
    margin-bottom: 10px;
    opacity: 0.8;
  }
  .hero-title {
    font-size: 48px;
    font-weight: 700;
    line-height: 1.1;
    margin-bottom: 12px;
    background: linear-gradient(135deg, #fff 40%, var(--cyan) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .hero-sub {
    font-size: 15px;
    color: var(--text-dim);
    max-width: 420px;
    line-height: 1.6;
    margin-bottom: 24px;
  }
  .hero-pills { display: flex; gap: 8px; flex-wrap: wrap; }
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.3px;
    border: 1px solid;
  }
  .pill-green { background: rgba(52,211,153,0.1); border-color: rgba(52,211,153,0.3); color: var(--green); }
  .pill-blue  { background: rgba(96,165,250,0.1);  border-color: rgba(96,165,250,0.3);  color: var(--blue);  }
  .pill-orange{ background: rgba(251,146,60,0.1);  border-color: rgba(251,146,60,0.3);  color: var(--orange);}
  .pill-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; box-shadow: 0 0 6px currentColor; }

  .hero-ai {
    flex-shrink: 0;
    align-self: center;
  }
  .ai-card {
    background: var(--surface2);
    border: 1px solid rgba(192,132,252,0.2);
    border-radius: 16px;
    padding: 20px 24px;
    width: 260px;
    cursor: pointer;
    transition: all 0.3s;
  }
  .ai-card:hover { border-color: rgba(192,132,252,0.5); transform: translateY(-2px); }
  .ai-card-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: linear-gradient(135deg, rgba(192,132,252,0.3), rgba(96,165,250,0.3));
    border: 1px solid rgba(192,132,252,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    margin-bottom: 12px;
    box-shadow: 0 0 20px rgba(192,132,252,0.2);
  }
  .ai-card-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .ai-card-sub { font-size: 12px; color: var(--text-dim); line-height: 1.4; }

  /* ─── STATS ROW ──────────────────────────────── */
  .section-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 16px;
  }
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 40px;
  }

  .stat-card {
    background: var(--surface);
    border-radius: 14px;
    padding: 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    cursor: pointer;
    transition: transform 0.2s;
    backdrop-filter: blur(12px);
  }
  .stat-card:hover { transform: translateY(-3px); }
  .stat-icon {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  .stat-val {
    font-family: 'Space Mono', monospace;
    font-size: 32px;
    font-weight: 700;
    line-height: 1;
  }
  .stat-label { font-size: 12px; color: var(--text-dim); margin-top: 3px; }

  /* ─── QUICK ACCESS ───────────────────────────── */
  .quick-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
  }

  .quick-card {
    background: var(--surface);
    border-radius: 14px;
    padding: 24px;
    display: flex;
    align-items: center;
    gap: 18px;
    cursor: pointer;
    transition: all 0.25s;
    backdrop-filter: blur(12px);
    min-height: 92px;
  }
  .quick-card:hover { transform: translateY(-3px); }
  .quick-icon {
    width: 52px;
    height: 52px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
  }
  .quick-info { flex: 1; }
  .quick-title { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
  .quick-sub { font-size: 13px; color: var(--text-dim); }
  .quick-arrow {
    font-size: 20px;
    color: var(--text-dim);
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .quick-card:hover .quick-arrow { color: var(--text); transform: translateX(4px); }

  /* ─── TWEAKS PANEL ───────────────────────────── */
  .tweaks-panel {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: rgba(6, 11, 20, 0.95);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(0,229,255,0.2);
    border-radius: 16px;
    padding: 20px;
    width: 260px;
    z-index: 200;
    box-shadow: 0 0 40px rgba(0,229,255,0.1);
    display: none;
  }
  .tweaks-panel.open { display: block; }
  .tweaks-title {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--cyan);
    margin-bottom: 16px;
  }
  .tweak-row { margin-bottom: 14px; }
  .tweak-label { font-size: 12px; color: var(--text-dim); margin-bottom: 6px; }
  .tweak-colors { display: flex; gap: 8px; flex-wrap: wrap; }
  .tweak-swatch {
    width: 28px; height: 28px; border-radius: 8px; cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.2s;
  }
  .tweak-swatch.active { border-color: white; }
  .tweak-select {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text);
    border-radius: 8px;
    padding: 7px 10px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    outline: none;
    cursor: pointer;
  }
  .tweak-toggle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
  }
  .toggle-switch {
    width: 36px; height: 20px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    position: relative;
    cursor: pointer;
    transition: background 0.2s;
  }
  .toggle-switch.on { background: var(--cyan); }
  .toggle-switch::after {
    content: '';
    position: absolute;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: white;
    top: 3px; left: 3px;
    transition: transform 0.2s;
  }
  .toggle-switch.on::after { transform: translateX(16px); }
</style>
</head>
<body>

<div class="bg-layer">
  <div class="bg-grid"></div>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>
  <div class="bg-glow bg-glow-3"></div>
</div>

<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "ledColor1": "#ffffff",
  "ledColor2": "#ffffff",
  "ledSpeed": "6",
  "glowIntensity": "low",
  "spinningLED": true,
  "uniformLED": true
}/*EDITMODE-END*/;

const NAV_ITEMS = [
  { label: 'Inicio', icon: '⌂', active: true },
  { label: 'Apuntes', icon: '📝' },
  { label: 'Materias', icon: '📚' },
  { label: 'Tareas', icon: '✓' },
  { label: 'Proyectos', icon: '◈' },
  { label: 'Exámenes', icon: '⊡' },
  { label: 'Calendario', icon: '▦' },
];

const STATS = [
  { val: 8,  label: 'Materias activas',   icon: '📘', color1: '#00e5ff', color2: '#0ea5e9', bg: 'rgba(0,229,255,0.12)',   led1: '#00e5ff', led2: '#0ea5e9' },
  { val: 0,  label: 'Tareas pendientes',  icon: '📋', color1: '#34d399', color2: '#059669', bg: 'rgba(52,211,153,0.12)', led1: '#34d399', led2: '#059669' },
  { val: 0,  label: 'Proyectos activos',  icon: '◈',  color1: '#c084fc', color2: '#9333ea', bg: 'rgba(192,132,252,0.12)',led1: '#c084fc', led2: '#9333ea' },
  { val: 0,  label: 'Examen próximo',     icon: '🔔', color1: '#fb923c', color2: '#ea580c', bg: 'rgba(251,146,60,0.12)', led1: '#fb923c', led2: '#ea580c' },
];

const QUICK = [
  { label: 'Materias',  sub: '8 materias activas',     icon: '📘', led1: '#00e5ff', led2: '#3b82f6', bg: 'rgba(0,229,255,0.12)' },
  { label: 'Tareas',    sub: 'Sin tareas pendientes',   icon: '📋', led1: '#34d399', led2: '#059669', bg: 'rgba(52,211,153,0.12)' },
  { label: 'Apuntes',   sub: 'Sin apuntes guardados',   icon: '📝', led1: '#c084fc', led2: '#818cf8', bg: 'rgba(192,132,252,0.12)' },
  { label: 'Exámenes',  sub: 'Sin exámenes registrados',icon: '⊡',  led1: '#fb923c', led2: '#f87171', bg: 'rgba(251,146,60,0.12)' },
];

function LedCard({ children, led1, led2, speed = '3s', spinning = true, className = '', style = {}, onClick }) {
  const cardStyle = {
    '--led-color1': led1,
    '--led-color2': led2,
    '--led-speed': speed + 's',
    ...style
  };
  const cls = `led ${spinning ? '' : 'led-static'} ${className}`;
  return (
    <div className={cls} style={cardStyle} onClick={onClick}>
      {children}
    </div>
  );
}

function Navbar({ activeNav, setActiveNav }) {
  return (
    <nav className="navbar">
      <div className="nav-logo">
        <div className="nav-logo-icon">⚡</div>
        <span className="nav-logo-text">AulaSync</span>
      </div>
      <div className="nav-links">
        {NAV_ITEMS.map(item => (
          <button
            key={item.label}
            className={`nav-link ${activeNav === item.label ? 'active' : ''}`}
            onClick={() => setActiveNav(item.label)}
          >
            {activeNav === item.label && <span className="dot" />}
            {item.icon} {item.label}
          </button>
        ))}
      </div>
      <div className="nav-user">
        <div className="nav-avatar">E</div>
        <div className="nav-user-info">
          <div className="nav-user-name">Estudiante</div>
          <div className="nav-user-role">5° Año</div>
        </div>
      </div>
    </nav>
  );
}

function App() {
  const [activeNav, setActiveNav] = useState('Inicio');
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);

  // Persist tweaks
  useEffect(() => {
    const saved = localStorage.getItem('aulasync-tweaks');
    if (saved) try { setTweaks(t => ({...t, ...JSON.parse(saved)})); } catch{}
  }, []);
  const updateTweak = (key, val) => {
    const next = { ...tweaks, [key]: val };
    setTweaks(next);
    localStorage.setItem('aulasync-tweaks', JSON.stringify(next));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
    // Update CSS vars live
    if (key === 'ledColor1') document.documentElement.style.setProperty('--led-color1', val);
    if (key === 'ledColor2') document.documentElement.style.setProperty('--led-color2', val);
    if (key === 'ledSpeed') document.documentElement.style.setProperty('--led-speed', val + 's');
  };

  // Tweaks toggle listener
  useEffect(() => {
    const handler = e => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const speed = tweaks.ledSpeed;
  const spinning = tweaks.spinningLED;
  const led1 = tweaks.ledColor1;
  const led2 = tweaks.ledColor2;

  const now = new Date();
  const days = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
  const months = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const dateStr = `${days[now.getDay()]}, ${now.getDate()} de ${months[now.getMonth()]} de ${now.getFullYear()}`;

  const glowMap = { low: '0.3', medium: '0.6', high: '1.0' };
  const glowOpacity = glowMap[tweaks.glowIntensity] || '0.6';

  return (
    <div className="page" style={{'--glow-opacity': glowOpacity}}>
      <Navbar activeNav={activeNav} setActiveNav={setActiveNav} />

      <main className="main">
        {/* HERO */}
        <div className="hero">
          <div className="hero-left">
            <div className="hero-date">{dateStr}</div>
            <h1 className="hero-title">¡Buen día! 👋</h1>
            <p className="hero-sub">
              Este es tu portal estudiantil. Navegá por las secciones usando los botones de abajo o el menú de arriba.
            </p>
            <div className="hero-pills">
              <span className="pill pill-green"><span className="pill-dot"/>Sin tareas pendientes</span>
              <span className="pill pill-blue"><span className="pill-dot"/>Sin eventos esta semana</span>
              <span className="pill pill-orange"><span className="pill-dot"/>Sin proyectos activos</span>
            </div>
          </div>
          <div className="hero-ai">
            <LedCard led1={led1} led2={led2} speed={speed} spinning={spinning}
              style={{borderRadius: 16}}>
              <div className="ai-card">
                <div className="ai-card-icon">✦</div>
                <div className="ai-card-title">Preguntar a la IA</div>
                <div className="ai-card-sub">Consultá dudas, pedí resúmenes o explicaciones al instante.</div>
              </div>
            </LedCard>
          </div>
        </div>

        {/* STATS */}
        <div className="section-label">Resumen del día</div>
        <div className="stats-row">
          {STATS.map((s, i) => (
            <LedCard key={i} led1={tweaks.uniformLED ? led1 : s.led1} led2={tweaks.uniformLED ? led2 : s.led2} speed={speed} spinning={spinning}>
              <div className="stat-card">
                <div className="stat-icon" style={{ background: s.bg }}>
                  {s.icon}
                </div>
                <div>
                  <div className="stat-val" style={{
                    background: `linear-gradient(135deg, ${s.color1}, ${s.color2})`,
                    WebkitBackgroundClip: 'text',
                    WebkitTextFillColor: 'transparent'
                  }}>{s.val}</div>
                  <div className="stat-label">{s.label}</div>
                </div>
              </div>
            </LedCard>
          ))}
        </div>

        {/* QUICK ACCESS */}
        <div className="section-label">Acceso rápido</div>
        <div className="quick-grid">
          {QUICK.map((q, i) => (
            <LedCard key={i} led1={tweaks.uniformLED ? led1 : q.led1} led2={tweaks.uniformLED ? led2 : q.led2} speed={speed} spinning={spinning}>
              <div className="quick-card">
                <div className="quick-icon" style={{ background: q.bg }}>
                  {q.icon}
                </div>
                <div className="quick-info">
                  <div className="quick-title">{q.label}</div>
                  <div className="quick-sub">{q.sub}</div>
                </div>
                <div className="quick-arrow">→</div>
              </div>
            </LedCard>
          ))}
        </div>
      </main>

      {/* TWEAKS */}
      <div className={`tweaks-panel ${tweaksOpen ? 'open' : ''}`}>
        <div className="tweaks-title">✦ Tweaks</div>

        <div className="tweak-row">
          <div className="tweak-label">Color LED principal</div>
          <div className="tweak-colors">
            {['#ffffff','#00e5ff','#34d399','#f472b6','#fbbf24','#a78bfa'].map(c => (
              <div key={c} className={`tweak-swatch ${tweaks.ledColor1===c?'active':''}`}
                style={{background:c, boxShadow:`0 0 8px ${c}`, border: c==='#ffffff' ? '2px solid rgba(255,255,255,0.4)' : undefined}}
                onClick={() => updateTweak('ledColor1', c)} />
            ))}
          </div>
        </div>

        <div className="tweak-row">
          <div className="tweak-label">Color LED secundario</div>
          <div className="tweak-colors">
            {['#ffffff','#c084fc','#60a5fa','#fb923c','#f87171','#4ade80'].map(c => (
              <div key={c} className={`tweak-swatch ${tweaks.ledColor2===c?'active':''}`}
                style={{background:c, boxShadow:`0 0 8px ${c}`, border: c==='#ffffff' ? '2px solid rgba(255,255,255,0.4)' : undefined}}
                onClick={() => updateTweak('ledColor2', c)} />
            ))}
          </div>
        </div>

        <div className="tweak-row">
          <div className="tweak-label">Velocidad del LED</div>
          <select className="tweak-select" value={tweaks.ledSpeed}
            onChange={e => updateTweak('ledSpeed', e.target.value)}>
            <option value="1.5">Rápido</option>
            <option value="3">Normal</option>
            <option value="6">Lento</option>
          </select>
        </div>

        <div className="tweak-row">
          <div className="tweak-label">Intensidad del brillo</div>
          <select className="tweak-select" value={tweaks.glowIntensity}
            onChange={e => updateTweak('glowIntensity', e.target.value)}>
            <option value="low">Suave</option>
            <option value="medium">Medio</option>
            <option value="high">Intenso</option>
          </select>
        </div>

        <div className="tweak-row">
          <div className="tweak-toggle">
            <span>Color uniforme en todos</span>
            <div className={`toggle-switch ${tweaks.uniformLED ? 'on' : ''}`}
              onClick={() => updateTweak('uniformLED', !tweaks.uniformLED)} />
          </div>
        </div>

        <div className="tweak-row">
          <div className="tweak-toggle">
            <span>LED giratorio</span>
            <div className={`toggle-switch ${tweaks.spinningLED ? 'on' : ''}`}
              onClick={() => updateTweak('spinningLED', !tweaks.spinningLED)} />
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
