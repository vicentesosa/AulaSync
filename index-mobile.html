<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AulaSync — Vista Móvil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: #030508;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 40px 20px 60px;
      overflow-x: hidden;
    }

    /* Fondo animado */
    .bg {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(0,229,255,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 90%, rgba(192,132,252,0.06) 0%, transparent 60%),
        #030508;
    }
    .bg-grid {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.025) 1px, transparent 1px);
      background-size: 52px 52px;
    }

    /* Título/header de la página */
    .page-top {
      position: relative; z-index: 10;
      display: flex; flex-direction: column; align-items: center;
      gap: 8px; margin-bottom: 36px;
    }
    .page-top-logo {
      display: flex; align-items: center; gap: 10px;
    }
    .logo-icon {
      width: 38px; height: 38px; border-radius: 11px;
      background: linear-gradient(135deg, #00e5ff, #c084fc);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      box-shadow: 0 0 20px rgba(0,229,255,0.4);
    }
    .page-top-logo span {
      font-family: 'Space Mono', monospace;
      font-size: 20px; font-weight: 700;
      background: linear-gradient(90deg, #00e5ff, #c084fc);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .page-top-sub {
      font-size: 13px; color: rgba(148,163,184,0.7);
      letter-spacing: 0.5px;
    }

    /* ═══════════════════════════════════════
       PHONE FRAME — iPhone 14
       ═══════════════════════════════════════ */
    .phone-scene {
      position: relative; z-index: 10;
      perspective: 1200px;
    }

    .phone-wrapper {
      position: relative;
      /* iPhone 14: screen 390×844, with bezel ~12px each side */
      width: 414px;
      border-radius: 55px;
      background: linear-gradient(160deg, #2a2a2c 0%, #1a1a1c 40%, #111113 100%);
      padding: 14px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.08),
        inset 0 0 0 1px rgba(255,255,255,0.04),
        0 40px 120px rgba(0,0,0,0.9),
        0 0 0 8px rgba(255,255,255,0.03),
        0 0 80px rgba(0,229,255,0.08);
    }

    /* Botones laterales */
    .phone-btn-right {
      position: absolute; right: -4px;
      background: linear-gradient(180deg, #2e2e30, #1e1e20);
      border-radius: 2px;
      width: 4px;
    }
    .phone-btn-right-1 { top: 160px; height: 74px; }
    .phone-btn-right-2 { top: 254px; height: 100px; }

    .phone-btn-left {
      position: absolute; left: -4px;
      background: linear-gradient(180deg, #2e2e30, #1e1e20);
      border-radius: 2px;
      width: 4px;
    }
    .phone-btn-left-1 { top: 130px; height: 36px; }
    .phone-btn-left-2 { top: 186px; height: 70px; }
    .phone-btn-left-3 { top: 270px; height: 70px; }

    /* Pantalla del teléfono */
    .phone-screen {
      width: 100%;
      height: 844px;
      border-radius: 44px;
      overflow: hidden;
      position: relative;
      background: #000;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06);
    }

    /* Dynamic Island */
    .dynamic-island {
      position: absolute;
      top: 14px; left: 50%;
      transform: translateX(-50%);
      width: 126px; height: 37px;
      background: #000;
      border-radius: 20px;
      z-index: 100;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.06);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 14px;
    }
    .di-camera {
      width: 12px; height: 12px; border-radius: 50%;
      background: #111; border: 1.5px solid #222;
      position: relative;
    }
    .di-camera::after {
      content: '';
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 5px; height: 5px; border-radius: 50%;
      background: #1a1a2a;
    }
    .di-speaker {
      width: 46px; height: 6px; border-radius: 3px;
      background: #1a1a1a;
    }

    /* Status bar */
    .status-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 56px;
      z-index: 99;
      display: flex; align-items: flex-end; justify-content: space-between;
      padding: 0 28px 10px;
      pointer-events: none;
    }
    .status-time {
      font-family: 'Space Mono', monospace;
      font-size: 15px; font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
    }
    .status-icons {
      display: flex; align-items: center; gap: 6px;
    }
    .status-icons svg { fill: #fff; }

    /* Home indicator */
    .home-bar {
      position: absolute;
      bottom: 10px; left: 50%;
      transform: translateX(-50%);
      width: 134px; height: 5px;
      background: rgba(255,255,255,0.3);
      border-radius: 3px;
      z-index: 100;
    }

    /* El iframe con la app */
    .phone-iframe {
      position: absolute;
      top: 0; left: 0;
      width: 390px; height: 844px;
      border: none;
      border-radius: 44px;
      /* Centrar en la pantalla de 100% width */
      left: 50%; transform: translateX(-50%);
    }

    /* Reflejo/brillo en la pantalla */
    .screen-glare {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 180px;
      background: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, transparent 100%);
      border-radius: 44px 44px 0 0;
      pointer-events: none; z-index: 101;
    }

    /* Botón de alternar desktop */
    .switch-bar {
      position: relative; z-index: 10;
      display: flex; align-items: center; gap: 12px;
      margin-top: 32px;
    }
    .switch-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 20px; border-radius: 10px;
      font-size: 13px; font-weight: 600; font-family: inherit;
      cursor: pointer; text-decoration: none; letter-spacing: 0.2px;
      transition: all 0.2s;
      border: 1px solid rgba(0,229,255,0.25);
      background: rgba(0,229,255,0.08); color: #00e5ff;
    }
    .switch-btn:hover {
      background: rgba(0,229,255,0.16);
      border-color: rgba(0,229,255,0.5);
      transform: translateY(-1px);
    }
    .switch-btn.purple {
      border-color: rgba(192,132,252,0.25);
      background: rgba(192,132,252,0.08); color: #c084fc;
    }
    .switch-btn.purple:hover {
      background: rgba(192,132,252,0.16);
      border-color: rgba(192,132,252,0.5);
    }
    .switch-btn i { font-size: 13px; }

    /* Indicador de resolución */
    .res-badge {
      position: relative; z-index: 10;
      margin-top: 14px;
      font-size: 11px; font-family: 'Space Mono', monospace;
      color: rgba(148,163,184,0.45);
      letter-spacing: 1px;
    }

    /* Responsive: si el viewport es muy chico (móvil real), redirigir */
    @media (max-width: 480px) {
      body { padding: 0; }
      .phone-scene, .page-top, .switch-bar, .res-badge, .bg-grid { display: none !important; }
      .phone-redirect-msg {
        display: flex !important;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        gap: 16px;
        color: #94a3b8;
        font-size: 15px;
        text-align: center;
        padding: 32px;
      }
    }
    .phone-redirect-msg { display: none; }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

  <div class="bg"></div>
  <div class="bg-grid"></div>

  <!-- Redirigir si es móvil real -->
  <script>
    if (window.innerWidth <= 480 || /iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
      window.location.replace('mobile-app.html');
    }
  </script>

  <!-- Mensaje fallback para móvil (antes del redirect) -->
  <div class="phone-redirect-msg">
    <i class="fas fa-spinner fa-spin" style="font-size:2rem;color:#00e5ff"></i>
    <p>Abriendo AulaSync…</p>
  </div>

  <!-- Header de la página -->
  <div class="page-top">
    <div class="page-top-logo">
      <div class="logo-icon">⚡</div>
      <span>AulaSync</span>
    </div>
    <p class="page-top-sub">Vista previa iPhone 14</p>
  </div>

  <!-- iPhone 14 mockup -->
  <div class="phone-scene">
    <div class="phone-wrapper">

      <!-- Botones físicos -->
      <div class="phone-btn-right phone-btn-right-1"></div>
      <div class="phone-btn-right phone-btn-right-2"></div>
      <div class="phone-btn-left phone-btn-left-1"></div>
      <div class="phone-btn-left phone-btn-left-2"></div>
      <div class="phone-btn-left phone-btn-left-3"></div>

      <!-- Pantalla -->
      <div class="phone-screen">

        <!-- Brillo de pantalla -->
        <div class="screen-glare"></div>

        <!-- Dynamic Island -->
        <div class="dynamic-island">
          <div class="di-camera"></div>
          <div class="di-speaker"></div>
        </div>

        <!-- Status bar -->
        <div class="status-bar">
          <span class="status-time" id="statusTime">9:41</span>
          <div class="status-icons">
            <!-- Señal -->
            <svg width="17" height="12" viewBox="0 0 17 12">
              <rect x="0" y="8" width="3" height="4" rx="1"/>
              <rect x="4.5" y="5.5" width="3" height="6.5" rx="1"/>
              <rect x="9" y="3" width="3" height="9" rx="1"/>
              <rect x="13.5" y="0" width="3" height="12" rx="1"/>
            </svg>
            <!-- WiFi -->
            <svg width="16" height="12" viewBox="0 0 16 12">
              <path d="M8 10a1.5 1.5 0 100 3 1.5 1.5 0 000-3z"/>
              <path d="M3.5 6.5C5 4.8 6.4 4 8 4s3 .8 4.5 2.5" stroke="#fff" stroke-width="1.5" fill="none" stroke-linecap="round"/>
              <path d="M1 3.5C3.3 1.3 5.5 0 8 0s4.7 1.3 7 3.5" stroke="#fff" stroke-width="1.5" fill="none" stroke-linecap="round"/>
            </svg>
            <!-- Batería -->
            <svg width="25" height="12" viewBox="0 0 25 12">
              <rect x="0" y="1" width="21" height="10" rx="3" stroke="#fff" stroke-width="1.2" fill="none"/>
              <rect x="21.5" y="3.5" width="3" height="5" rx="1.5" fill="rgba(255,255,255,0.6)"/>
              <rect x="1.5" y="2.5" width="15" height="7" rx="2" fill="#fff"/>
            </svg>
          </div>
        </div>

        <!-- Home indicator -->
        <div class="home-bar"></div>

        <!-- La app en iframe -->
        <iframe
          class="phone-iframe"
          src="mobile-app.html"
          title="AulaSync Mobile"
          scrolling="no"
          allow="same-origin"
        ></iframe>

      </div><!-- /phone-screen -->
    </div><!-- /phone-wrapper -->
  </div><!-- /phone-scene -->

  <!-- Acciones -->
  <div class="switch-bar">
    <a href="index.html" class="switch-btn purple">
      <i class="fas fa-desktop"></i> Ver versión desktop
    </a>
    <a href="mobile-app.html" class="switch-btn">
      <i class="fas fa-mobile-alt"></i> Abrir en pantalla completa
    </a>
  </div>
  <p class="res-badge">iPhone 14 · 390 × 844 px · 3× · 2532 × 1170 px físicos</p>

  <script>
    // Actualizar hora en la status bar
    function updateTime() {
      const now = new Date();
      const h = now.getHours().toString().padStart(2,'0');
      const m = now.getMinutes().toString().padStart(2,'0');
      document.getElementById('statusTime').textContent = h + ':' + m;
    }
    updateTime();
    setInterval(updateTime, 30000);
  </script>

</body>
</html>
